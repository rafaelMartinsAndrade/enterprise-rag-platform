services:
  api:
    build: .
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - ${COMPOSE_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/enterprise_rag
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_ROOT: /app/data/storage
      STREAMLIT_API_BASE_URL: http://api:8000/api/v1
    ports:
      - "8000:8000"
    volumes:
      - rag_storage:/app/data/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: .
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=info
    env_file:
      - ${COMPOSE_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/enterprise_rag
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_ROOT: /app/data/storage
    volumes:
      - rag_storage:/app/data/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ui:
    build: .
    command: streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - ${COMPOSE_ENV_FILE:-.env}
    environment:
      STREAMLIT_API_BASE_URL: http://api:8000/api/v1
      API_TOKEN: change-me
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: enterprise_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enterprise_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rag_storage:
